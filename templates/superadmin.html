<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superadmin - TableManager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container-fluid">
      <span class="navbar-brand">🏫 TableManager – Superadmin</span>
      <button class="btn btn-outline-light" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container" id="loginSection">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body">
            <h3 class="card-title text-center mb-4">Superadmin Login</h3>
            <div class="mb-3"><label>Username</label><input id="username" class="form-control" value="superadmin"></div>
            <div class="mb-3"><label>Password</label><input type="password" id="password" class="form-control" value="admin123"></div>
            <button class="btn btn-primary w-100" onclick="login()">Login</button>
            <div id="loginMsg" class="text-danger mt-2"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container" id="adminSection" style="display:none">
    <ul class="nav nav-tabs mb-4" id="superTabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tenantsTab" type="button">Tenants</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#monitorTab" type="button">Monitoring</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#notifTab" type="button">Notifications</button></li>
    </ul>

    <div class="tab-content">
      <!-- Tenants Tab -->
      <div class="tab-pane fade show active" id="tenantsTab">
        <div class="card mb-3">
          <div class="card-header">Create Tenant</div>
          <div class="card-body">
            <form id="createTenantForm" class="row g-2">
              <div class="col-md-3"><input id="deptName" class="form-control" placeholder="Department" required></div>
              <div class="col-md-3"><input id="tenantEmail" class="form-control" placeholder="Chairperson Email" required></div>
              <div class="col-md-2"><input type="password" id="tenantPwd" class="form-control" placeholder="Password" required></div>
              <div class="col-md-2"><input id="trialDays" type="number" class="form-control" placeholder="Trial Days" value="30"></div>
              <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Create</button></div>
            </form>
          </div>
        </div>
        <h5>All Tenants</h5>
        <div class="table-responsive">
          <table class="table table-striped" id="tenantTable">
            <thead><tr><th>Dept</th><th>Email</th><th>Trial End</th><th>Members</th><th>Contrib</th><th>Loans</th><th>Projects</th><th>Active</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Monitoring Tab -->
      <div class="tab-pane fade" id="monitorTab">
        <div class="row mb-3">
          <div class="col-md-4">
            <select id="monitorTenant" class="form-select" onchange="loadMonitoring()">
              <option value="">-- Select Tenant --</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6"><canvas id="chartContribByMember"></canvas></div>
          <div class="col-md-6"><canvas id="chartLoanStatus"></canvas></div>
        </div>
        <div class="row mt-4">
          <div class="col-12"><canvas id="chartMonthlyContrib"></canvas></div>
        </div>
      </div>

      <!-- Notifications Tab -->
      <div class="tab-pane fade" id="notifTab">
        <div class="card mb-3">
          <div class="card-header">Send Notification / Reminder</div>
          <div class="card-body">
            <div class="row g-2">
              <div class="col-md-4"><select id="notifTenant" class="form-select"><option value="">-- Select Tenant --</option></select></div>
              <div class="col-md-6"><input id="notifMessage" class="form-control" placeholder="Message"></div>
              <div class="col-md-1"><button class="btn btn-primary w-100" onclick="sendNotification()">Send</button></div>
              <div class="col-md-1"><button class="btn btn-warning w-100" onclick="sendReminder()">Remind</button></div>
            </div>
          </div>
        </div>
        <h5>Sent Notifications</h5>
        <ul class="list-group" id="notifList"></ul>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let token = '';
    function login(){
      fetch('/api/auth/superadmin/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username:document.getElementById('username').value, password:document.getElementById('password').value})
      }).then(r=>r.json()).then(d=>{
        if(d.token){ token = d.token; document.getElementById('loginSection').style.display='none';
          document.getElementById('adminSection').style.display='block'; loadAll(); }
        else document.getElementById('loginMsg').innerText='Login failed';
      });
    }
    function logout(){ token=''; location.reload(); }
    function authHeaders(){ return {'Authorization':'Bearer '+token, 'Content-Type':'application/json'}; }

    function loadAll(){
      loadTenants();
    }

    // TENANTS
    function loadTenants(){
      fetch('/api/superadmin/tenants', {headers:{'Authorization':'Bearer '+token}})
      .then(r=>r.json()).then(data=>{
        let tbody = document.querySelector('#tenantTable tbody'); tbody.innerHTML='';
        let selectM = document.getElementById('monitorTenant');
        let selectN = document.getElementById('notifTenant');
        selectM.innerHTML = '<option value="">-- Select Tenant --</option>';
        selectN.innerHTML = '<option value="">-- Select Tenant --</option>';
        data.forEach(t=>{
          tbody.innerHTML += `<tr>
            <td>${t.department_name}</td><td>${t.chairperson_email}</td><td>${new Date(t.trial_end_date).toLocaleDateString()}</td>
            <td>${t.members || 0}</td><td>${t.total_contributions || 0}</td><td>${t.active_loans || 0}</td><td>${t.projects || 0}</td>
            <td><span class="badge bg-${t.is_active?'success':'danger'}">${t.is_active?'Yes':'No'}</span></td>
            <td>
              <button class="btn btn-sm btn-outline-warning" onclick="changePassword('${t._id}', prompt('New password:'))">Pwd</button>
              <button class="btn btn-sm btn-outline-info" onclick="extendTrial('${t._id}', prompt('Days'))">Trial</button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteTenant('${t._id}')">Del</button>
            </td></tr>`;
          selectM.innerHTML += `<option value="${t._id}">${t.department_name}</option>`;
          selectN.innerHTML += `<option value="${t._id}">${t.department_name}</option>`;
        });
        // if a tenant was previously selected, reload monitoring
        if(document.getElementById('monitorTenant').value) loadMonitoring();
      });
    }
    document.getElementById('createTenantForm').addEventListener('submit', e=>{
      e.preventDefault();
      fetch('/api/superadmin/tenants',{method:'POST',headers:authHeaders(),
        body:JSON.stringify({department_name:document.getElementById('deptName').value,
          chairperson_email:document.getElementById('tenantEmail').value,
          password:document.getElementById('tenantPwd').value,
          trial_days:parseInt(document.getElementById('trialDays').value)})
      }).then(r=>r.json()).then(d=>{alert(d.msg); loadTenants();});
    });
    function changePassword(id, pwd){ if(pwd) fetch('/api/superadmin/tenants/'+id,{method:'PUT',headers:authHeaders(),body:JSON.stringify({password:pwd})}).then(r=>r.json()).then(d=>alert(d.msg)); }
    function extendTrial(id, days){ if(days) fetch('/api/superadmin/tenants/'+id,{method:'PUT',headers:authHeaders(),body:JSON.stringify({trial_days:parseInt(days)})}).then(r=>r.json()).then(d=>{alert(d.msg); loadTenants();}); }
    function deleteTenant(id){ if(confirm('Delete?')) fetch('/api/superadmin/tenants/'+id,{method:'DELETE',headers:authHeaders()}).then(r=>r.json()).then(d=>{alert(d.msg); loadTenants();}); }

    // MONITORING
    let charts = {};
    function loadMonitoring(){
      let tid = document.getElementById('monitorTenant').value;
      if(!tid) return;
      // Clear previous charts
      Object.values(charts).forEach(c => c.destroy());
      // Fetch data for selected tenant
      Promise.all([
        fetch(`/api/superadmin/tenants/${tid}/members`, {headers:authHeaders()}).then(r=>r.json()),
        fetch(`/api/superadmin/tenants/${tid}/contributions`, {headers:authHeaders()}).then(r=>r.json())
      ]).then(([members, contribs]) => {
        // Aggregate contributions per member
        let memberMap = {};
        members.forEach(m => memberMap[m._id] = m.first_name + ' ' + m.last_name);
        let contribByMember = {};
        contribs.forEach(c => {
          let key = memberMap[c.member_id] || 'Unknown';
          contribByMember[key] = (contribByMember[key] || 0) + c.amount;
        });
        let labels = Object.keys(contribByMember);
        let amounts = Object.values(contribByMember);
        // Bar chart: contributions by member
        let ctx1 = document.getElementById('chartContribByMember').getContext('2d');
        charts.bar = new Chart(ctx1, {
          type: 'bar',
          data: { labels, datasets: [{ label: 'Total Contribution', data: amounts, backgroundColor: '#0d6efd' }] },
          options: { responsive: true, plugins: { title: { display: true, text: 'Contributions by Member' } } }
        });
        // Loan status pie (fetch loan data from tenant dashboard summary)
        fetch(`/api/superadmin/tenants/${tid}/monitor`, {headers:authHeaders()}).then(r=>r.json()).then(summary => {
          let ctx2 = document.getElementById('chartLoanStatus').getContext('2d');
          charts.pie = new Chart(ctx2, {
            type: 'pie',
            data: {
              labels: ['Active Loans', 'Members', 'Projects'],
              datasets: [{ data: [summary.active_loans, summary.members, summary.projects], backgroundColor: ['#ffc107', '#0d6efd', '#198754'] }]
            },
            options: { plugins: { title: { display: true, text: 'Dashboard Summary' } } }
          });
        });
        // Monthly contributions line chart
        let monthlyMap = {};
        contribs.forEach(c => {
          let month = c.date.substring(0,7);
          monthlyMap[month] = (monthlyMap[month] || 0) + c.amount;
        });
        let sortedMonths = Object.keys(monthlyMap).sort();
        let monthlyData = sortedMonths.map(m => monthlyMap[m]);
        let ctx3 = document.getElementById('chartMonthlyContrib').getContext('2d');
        charts.line = new Chart(ctx3, {
          type: 'line',
          data: { labels: sortedMonths, datasets: [{ label: 'Monthly Contributions', data: monthlyData, borderColor: '#198754' }] },
          options: { responsive: true, plugins: { title: { display: true, text: 'Contributions Over Time' } }, scales: { y: { beginAtZero: true } } }
        });
      });
    }

    // NOTIFICATIONS
    function sendNotification(){
      let tid = document.getElementById('notifTenant').value;
      let msg = document.getElementById('notifMessage').value;
      if(!tid||!msg) return alert('Select tenant and enter message');
      fetch('/api/superadmin/notifications',{method:'POST',headers:authHeaders(),
        body:JSON.stringify({tenant_id:tid, message:msg})}).then(r=>r.json()).then(d=>alert(d.msg));
    }
    function sendReminder(){
      let tid = document.getElementById('notifTenant').value;
      let msg = document.getElementById('notifMessage').value;
      if(!tid||!msg) return alert('Select tenant and enter message');
      fetch('/api/superadmin/notifications/reminder',{method:'POST',headers:authHeaders(),
        body:JSON.stringify({tenant_id:tid, message:msg})}).then(r=>r.json()).then(d=>alert(d.msg));
    }
    document.getElementById('notifTenant').addEventListener('change', function(){
      let tid = this.value;
      if(!tid) return document.getElementById('notifList').innerHTML='';
      fetch(`/api/superadmin/tenants/${tid}/notifications`,{headers:authHeaders()})
      .then(r=>r.json()).then(data=>{
        let ul = document.getElementById('notifList'); ul.innerHTML='';
        data.forEach(n=>{ ul.innerHTML += `<li class="list-group-item">${n.message} <small class="text-muted">${new Date(n.created_at).toLocaleString()}</small></li>`; });
      });
    });
  </script>
</body>
</html>
